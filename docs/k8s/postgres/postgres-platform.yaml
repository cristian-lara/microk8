# CloudNativePG Cluster for platform namespace - uses nfs-storage (Synology NFS).
# Apply: from repo root on VM: ./docs/k8s/postgres/apply-postgres-platform.sh
# Compliant with .cursor/rules/k8s-yaml-prod.mdc (versioned image, resources, securityContext).
# NFS: Synology NFS Permissions must use Squash "No mapping" so UID 26 is preserved;
#      otherwise initdb fails with "data directory has wrong ownership". See docs/08-notas-implementacion.md §2.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: platform-db
  namespace: platform
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3
  storage:
    storageClass: nfs-storage
    size: 20Gi
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
  # Pod security context (run as non-root; PostgreSQL image uses 26:26). With NFS "No mapping", files keep UID 26.
  podSecurityContext:
    runAsUser: 26
    runAsGroup: 26
    fsGroup: 26
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
      add: []  # add only if strictly needed
  bootstrap:
    initdb:
      database: platform
      owner: platform_owner
