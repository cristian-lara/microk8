# Keycloak Helm Chart - Production Values
# Chart: bitnami/keycloak
# Documentation: https://github.com/bitnami/charts/tree/main/bitnami/keycloak
#
# This configuration:
# - Disables internal PostgreSQL (uses external platform-db)
# - Uses nfs-storage for persistence (themes, providers)
# - Configures for production mode
# - Exposes via Ingress for Cloudflare Tunnel

# =============================================================================
# KEYCLOAK CONFIGURATION
# =============================================================================
auth:
  adminUser: admin
  existingSecret: keycloak-admin-secret
  passwordSecretKey: admin-password

# Production mode
production: true

# Proxy configuration (behind Cloudflare/Ingress)
proxy: edge

# =============================================================================
# DISABLE INTERNAL POSTGRESQL
# =============================================================================
postgresql:
  enabled: false

# =============================================================================
# EXTERNAL DATABASE (platform-db)
# =============================================================================
externalDatabase:
  host: platform-db-rw.platform.svc.cluster.local
  port: 5432
  user: keycloak
  database: keycloak
  existingSecret: keycloak-db-secret
  existingSecretPasswordKey: password

# =============================================================================
# IMAGE
# =============================================================================
image:
  registry: docker.io
  repository: bitnami/keycloak
  tag: "24.0.5"
  pullPolicy: IfNotPresent

# =============================================================================
# REPLICAS
# =============================================================================
replicaCount: 1

# =============================================================================
# SERVICE
# =============================================================================
service:
  type: ClusterIP
  http:
    enabled: true
  ports:
    http: 80
    https: 443

# =============================================================================
# INGRESS
# =============================================================================
ingress:
  enabled: true
  ingressClassName: nginx
  hostname: keycloak.cld-lf.com
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  tls: false

# =============================================================================
# RESOURCES
# =============================================================================
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1536Mi

# =============================================================================
# SECURITY CONTEXT
# =============================================================================
podSecurityContext:
  enabled: true
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# =============================================================================
# PROBES
# =============================================================================
livenessProbe:
  enabled: true
  initialDelaySeconds: 300
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60
  successThreshold: 1

# =============================================================================
# PERSISTENCE (for themes, providers, etc.)
# =============================================================================
# Keycloak doesn't require persistence for data (stored in DB)
# but can be useful for custom themes/providers

# =============================================================================
# LOGGING
# =============================================================================
logging:
  output: default
  level: INFO

# =============================================================================
# KEYCLOAK CONFIGURATION (extra environment variables)
# =============================================================================
extraEnvVars:
  - name: KEYCLOAK_EXTRA_ARGS
    value: "--hostname-strict=false"
  - name: KC_HOSTNAME_URL
    value: "https://keycloak.cld-lf.com"
  - name: KC_HOSTNAME_ADMIN_URL
    value: "https://keycloak.cld-lf.com"

# =============================================================================
# CACHE (for single replica, use local cache)
# =============================================================================
cache:
  enabled: true
  stackName: kubernetes
  stackFile: ""

# =============================================================================
# METRICS (optional - for monitoring)
# =============================================================================
metrics:
  enabled: false
