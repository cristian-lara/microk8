# Keycloak Helm Chart - Production Values
# Chart: codecentric/keycloakx (uses official Keycloak image)
# Documentation: https://github.com/codecentric/helm-charts/tree/master/charts/keycloakx
#
# Note: Bitnami images are no longer free since Aug 2025.
# This uses the official Keycloak image from quay.io/keycloak/keycloak

# =============================================================================
# IMAGE (Official Keycloak)
# =============================================================================
image:
  repository: quay.io/keycloak/keycloak
  tag: "24.0.5"
  pullPolicy: IfNotPresent

# =============================================================================
# COMMAND (Production mode with external DB)
# =============================================================================
command:
  - "/opt/keycloak/bin/kc.sh"
args:
  - "start"
  - "--hostname=keycloak.cld-lf.com"
  - "--hostname-strict=false"
  - "--http-enabled=true"
  - "--proxy-headers=xforwarded"
  - "--db=postgres"
  - "--db-url-host=$(KC_DB_URL_HOST)"
  - "--db-url-database=$(KC_DB_URL_DATABASE)"
  - "--db-username=$(KC_DB_USERNAME)"
  - "--db-password=$(KC_DB_PASSWORD)"

# =============================================================================
# REPLICAS
# =============================================================================
replicas: 1

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
extraEnv: |
  - name: KC_DB_URL_HOST
    value: "platform-db-rw.platform.svc.cluster.local"
  - name: KC_DB_URL_DATABASE
    value: "keycloak"
  - name: KC_DB_USERNAME
    value: "keycloak"
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-db-secret
        key: password
  - name: KEYCLOAK_ADMIN
    value: "admin"
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-secret
        key: admin-password
  - name: KC_HEALTH_ENABLED
    value: "true"
  - name: KC_METRICS_ENABLED
    value: "false"
  - name: KC_HTTP_RELATIVE_PATH
    value: "/"
  - name: KC_CACHE
    value: "local"
  - name: KC_CACHE_STACK
    value: ""

# =============================================================================
# SERVICE
# =============================================================================
service:
  type: ClusterIP
  httpPort: 80
  httpsPort: 443
  httpNodePort: null
  httpsNodePort: null
  annotations: {}
  labels: {}

http:
  relativePath: "/"

# =============================================================================
# INGRESS
# =============================================================================
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  rules:
    - host: keycloak.cld-lf.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# =============================================================================
# RESOURCES
# =============================================================================
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "1536Mi"

# =============================================================================
# SECURITY CONTEXT
# =============================================================================
securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  fsGroup: 1000

containerSecurityContext:
  runAsUser: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# =============================================================================
# PROBES
# =============================================================================
livenessProbe: |
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 300
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe: |
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe: |
  httpGet:
    path: /health/started
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60

# =============================================================================
# DATABASE (disabled - using external)
# =============================================================================
postgresql:
  enabled: false

# =============================================================================
# CACHE (single replica - disable distributed cache)
# =============================================================================
cache:
  stack: ""

# =============================================================================
# STATEFULSET
# =============================================================================
statefulsetLabels: {}
podLabels: {}
podAnnotations: {}
