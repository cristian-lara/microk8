# Keycloak Helm Chart - Production Values
# Chart: codecentric/keycloakx
# Documentation: https://github.com/codecentric/helm-charts/tree/master/charts/keycloakx
#
# VALIDATED CONFIGURATION:
# - Uses official Keycloak image from quay.io
# - Single replica (no clustering) with local cache
# - External PostgreSQL (platform-db)
# - cache.stack: custom disables automatic cache config

# =============================================================================
# IMAGE
# =============================================================================
image:
  repository: quay.io/keycloak/keycloak
  tag: "24.0.5"
  pullPolicy: IfNotPresent

# =============================================================================
# REPLICAS (single instance)
# =============================================================================
replicas: 1

# =============================================================================
# COMMAND AND ARGS
# =============================================================================
# Override to use production start with explicit DB config
command:
  - "/opt/keycloak/bin/kc.sh"
args:
  - "start"

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
extraEnv: |
  - name: KC_DB
    value: "postgres"
  - name: KC_DB_URL_HOST
    value: "platform-db-rw.platform.svc.cluster.local"
  - name: KC_DB_URL_PORT
    value: "5432"
  - name: KC_DB_URL_DATABASE
    value: "keycloak"
  - name: KC_DB_USERNAME
    value: "keycloak"
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-db-secret
        key: password
  # Hostname only (no scheme) - scheme comes from X-Forwarded-Proto via Ingress
  - name: KC_HOSTNAME
    value: "keycloak.cld-lf.com"
  - name: KC_HOSTNAME_ADMIN
    value: "https://keycloak.cld-lf.com"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"
  - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
    value: "true"
  - name: KEYCLOAK_ADMIN
    value: "admin"
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-secret
        key: admin-password

# =============================================================================
# CACHE (valid values: tcp, udp, kubernetes, ec2, azure, google)
# For single replica in K8s, "kubernetes" works fine (no peers to discover)
# =============================================================================
cache:
  stack: kubernetes

# =============================================================================
# PROXY
# =============================================================================
proxy:
  enabled: true
  mode: xforwarded

# =============================================================================
# HTTP
# =============================================================================
http:
  relativePath: "/"

# =============================================================================
# HEALTH AND METRICS
# =============================================================================
health:
  enabled: true

metrics:
  enabled: false

# =============================================================================
# DATABASE (disabled - using external via env vars)
# =============================================================================
database:
  vendor: ""

# =============================================================================
# SERVICE
# =============================================================================
service:
  type: ClusterIP
  httpPort: 80
  httpsPort: 443

# =============================================================================
# INGRESS
# =============================================================================
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
  rules:
    - host: keycloak.cld-lf.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# =============================================================================
# RESOURCES
# =============================================================================
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "1536Mi"

# =============================================================================
# SECURITY CONTEXT
# =============================================================================
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsNonRoot: true

# =============================================================================
# PROBES (use chart defaults with correct relativePath)
# =============================================================================
livenessProbe: |
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 300
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe: |
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

startupProbe: |
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  timeoutSeconds: 5
  failureThreshold: 60
  periodSeconds: 5

# =============================================================================
# DBCHECKER (disabled - we trust platform-db is ready)
# =============================================================================
dbchecker:
  enabled: false
